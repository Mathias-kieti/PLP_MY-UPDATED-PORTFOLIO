<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Contact — Mathias Kieti</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo">mk.</a>
      <button id="menuToggle" class="menu-toggle" aria-expanded="false">☰</button>
      <nav id="mainNav" class="main-nav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="contact.html" aria-current="page">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="contact-section">
      <div class="container">
        <div class="contact-inner">
          <p class="section-label">// get in touch</p>
          <h2>Let's build<br>something<br><span style="color:var(--lime)">together.</span></h2>
          <p class="sub">Got a project idea, a collab in mind, or just want to say hi? Drop me a message.</p>

          <form id="contactForm" action="#" method="post" novalidate>
            <label>
              <span>Your Name</span>
              <input name="name" type="text" placeholder="e.g. Jane Doe" required>
            </label>
            <label>
              <span>Email Address</span>
              <input name="email" type="email" placeholder="you@example.com" required>
            </label>
            <label>
              <span>Message</span>
              <textarea name="message" placeholder="What's on your mind?" required></textarea>
            </label>
            <button type="submit">Send Message →</button>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2025 Mathias_Kieti</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
